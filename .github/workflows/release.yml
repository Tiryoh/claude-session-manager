name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt
      - uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2
      - run: make vet
      - run: go test -race ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          go build -ldflags "-s -w -X main.version=${VERSION}" -o csm ./cmd/csm
          tar czf "csm_${GOOS}_${GOARCH}.tar.gz" csm
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: csm_${{ matrix.goos }}_${{ matrix.goarch }}
          path: csm_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum csm_*.tar.gz > SHA256SUMS
      - uses: softprops/action-gh-release@v3.0.1
        with:
          files: |
            dist/csm_*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
